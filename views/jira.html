<!-- Tab: Tareas Jira -->
<main class="main-content hidden" id="tab-jira">
      <header class="header">
        <div class="header-titles">
          <h1>Tareas Jira</h1>
          <p>Todas tus tareas del equipo</p>
        </div>
        <div class="header-actions" style="display:flex; align-items:center; gap:16px;">
          <button class="update-btn" onclick="openCreateJiraModal()" style="margin:0; padding:6px 12px; font-size:13px; display:flex; align-items:center; gap:6px;">
            <i data-lucide="plus" style="width:14px;height:14px;"></i> Nuevo Ticket
          </button>
          <div class="tabs-header" style="border:none; padding:0; margin:0;">
            <div class="tab-item active" onclick="filterJira('mis', this)">Mis tareas</div>
            <div class="tab-item" onclick="filterJira('todas', this)">Todas</div>
          </div>
        </div>
      </header>
      <div id="jira-tab-list" class="list-container" style="padding:0; gap:0;">
        <div style="padding:20px; color:#64748b; text-align:center;">Cargando...</div>
      </div>
    </main>
